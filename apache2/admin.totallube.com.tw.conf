<VirtualHost *:80>
    ServerAdmin gswdkimo@oil.com.tw
    ServerName admin.totallube.com.tw

    ProxyRequests Off
    ProxyPreserveHost On

    <Proxy *>
        Require all granted
    </Proxy>

    ProxyPass        /  http://127.0.0.1:6000/
    ProxyPassReverse /  http://127.0.0.1:6000/

    ErrorLog "| /usr/bin/rotatelogs /var/log/webs/admin.totallube.com.tw/totallube-error_log-%Y-%m-%d 86400"
    CustomLog "| /usr/bin/rotatelogs /var/log/webs/admin.totallube.com.tw/totallube-access_log-%Y-%m-%d 86400" combined

    # HTTP Basic Auth（第一道防線）
    # <Location />
    #     AuthType Basic
    #     AuthName "Admin Area"
    #     AuthUserFile /etc/apache2/.htpasswd
    #     Require valid-user
    # </Location>
</VirtualHost>
