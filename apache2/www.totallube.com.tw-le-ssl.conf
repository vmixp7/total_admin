<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin gswdkimo@oil.com.tw
    ServerName www.totallube.com.tw
    DocumentRoot "/home/webs/www.totallube.com.tw/web"
    # 日誌設定
    ErrorLog "| /usr/bin/rotatelogs /var/log/webs/www.totallube.com.tw/totallube-error_log-%Y-%m-%d 86400"
    CustomLog "| /usr/bin/rotatelogs /var/log/webs/www.totallube.com.tw/totallube-access_log-%Y-%m-%d 86400" combined
    <Directory "/home/webs/www.totallube.com.tw/web">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    # 設定預設首頁
    DirectoryIndex index.html
    # 設定正確的 MIME 類型
    AddDefaultCharset UTF-8

    # SSL 設定
    SSLCertificateFile /etc/letsencrypt/live/www.totallube.com.tw/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/www.totallube.com.tw/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>